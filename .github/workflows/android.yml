name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || chmod +x android/gradlew

    - name: Build APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleRelease
        elif [ -d "android" ]; then
          cd android && ./gradlew assembleRelease
        else
          echo "No se encontró gradlew" && exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: KML-Craft-APK
        path: "**/build/outputs/apk/release/*.apk"
