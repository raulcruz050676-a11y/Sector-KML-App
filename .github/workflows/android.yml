name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission
      run: find . -name "gradlew" -exec chmod +x {} +

    - name: Build APK
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: No se encontró el archivo gradlew en ninguna carpeta."
          exit 1
        fi
        cd $(dirname "$GRADLEW_PATH")
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: KML-Craft-APK
        path: "**/build/outputs/apk/release/*.apk"
