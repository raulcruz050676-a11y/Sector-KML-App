plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    // ESTA ES LA LÍNEA QUE FALTA Y QUE MARCÓ EL ERROR:
    namespace "com.tuapp.kmlcraft"
    
    compileSdk 34

    defaultConfig {
        applicationId "com.tuapp.kmlcraft"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
